<div class="mainArea">
  <div class="container">
    <div class="columns is-centered">
      <div class="box column is-one-third">
        <h1 class="title has-text-centered">Şifre Oluşturucu</h1>

        <div class="field">
          <label>Şifre Uzunluğu</label>
          <input class="input" (change)="modifyLength($event)" />
        </div>

        <div class="field">
          <div class="control">
            <label class="checkbox">
              <input type="checkbox" (change)="modifyLetters()" />
              Alfabeyi Kullan
            </label>
          </div>
        </div>

        <div class="field">
          <div class="control">
            <label class="checkbox">
              <input type="checkbox" (change)="modifyNumbers()" />
              Sayıları Kullan
            </label>
          </div>
        </div>

        <div class="field">
          <div class="control">
            <label class="checkbox">
              <input type="checkbox" (change)="modifySymbols()" />
              Sembolleri Kullan
            </label>
          </div>
        </div>

        <!-- Butonun devre dışı bırakılma şartı: 
            - Şifre uzunluğu (length) belirtilmemişse veya 
            - Kullanıcı harf, sayı ya da sembollerden hiçbirini seçmemişse -->
        <button
          [disabled]="
            !(length && (includeLetters || includeNumbers || includeSymbols))
          "
          [disabled]="!length"
          (click)="buttonClick()"
          class="button is-link is-fullwidth"
        >
          Oluştur
        </button>

        <div class="box" *ngIf="password">
          <!-- Eğer şifre oluşturulmuşsa ('password' değeri varsa) bu div görünür -->
          <label>Şifreniz</label>
          <input class="input" [value]="password" />
        </div>
      </div>
    </div>
  </div>
</div>

<router-outlet />
